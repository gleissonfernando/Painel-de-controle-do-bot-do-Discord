<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Magnatas Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics script - only loaded if VITE_ANALYTICS_ENDPOINT is defined -->
    <script>
      if (typeof import.meta !== 'undefined' && import.meta.env.VITE_ANALYTICS_ENDPOINT) {
        const script = document.createElement('script');
        script.defer = true;
        script.src = import.meta.env.VITE_ANALYTICS_ENDPOINT + '/umami';
        script.setAttribute('data-website-id', import.meta.env.VITE_ANALYTICS_WEBSITE_ID);
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
